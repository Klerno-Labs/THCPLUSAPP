<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THC Plus — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #090F09;
      color: #EBF0EB;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      background: linear-gradient(135deg, #10B981, #047857);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.2);
    }
    .logo svg { width: 50px; height: 50px; }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    h1 span { color: #10B981; }
    p {
      color: #6B7B6B;
      font-size: 1rem;
      max-width: 300px;
      line-height: 1.6;
    }
    .retry {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #10B981;
      color: #090F09;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry:hover { background: #34D399; }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="16" y="4" width="8" height="32" rx="2" fill="white"/>
      <rect x="4" y="16" width="32" height="8" rx="2" fill="white"/>
    </svg>
  </div>
  <h1>THC <span>Plus</span></h1>
  <p>You're currently offline. Please check your internet connection and try again.</p>
  <button class="retry" onclick="window.location.reload()">Try Again</button>
</body>
</html>
